<!doctype html>
<html lang="en">
<head>
  <title>Ponder Invest AI Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="card login-card app-card">
      <div class="brand login-brand"><span class="brand-mark">P</span> Ponder<span>AI</span></div>
      <p class="muted">Secure research dashboard access</p>
      <p class="snapshot-warning">Learning-mode dashboard. No secrets are shown here.</p>
      {% if error %}<p class="riskText">{{ error }}</p>{% endif %}
      <form method="post">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" autofocus>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password">
        <button type="submit">Log In</button>
      </form>
      <p class="muted small-note">Set <code>PONDER_DASHBOARD_USERNAME</code> and <code>PONDER_DASHBOARD_PASSWORD</code> in <code>.env</code>.</p>
    </section>
  </main>
</body>
</html>
